<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <head>
        <script src="calculator.js"></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <div id="operator_btns">
            <button id="b_1" onclick="op='300'">300g</button>
            <button id="b_2" onclick="op='400'">400g</button>
            <button id="b_3" onclick="op='180'">180g</button>
        </div>
        <br>

        <div>
            <button onclick="func()">Подтвердить</button>
        </div>

        <div>
            <p id="result_g" class="p_palette">Вес не выбран.</p>
            
        </div>

        <div>
            <p class="p_palette">Количество рядов:</p>
            <input type="number" id="num1" min="1" max="15" value="1">
        </div>
        <br>
        
        <div>
            <p class="p_palette">Количество 7-рок:</p>
            <input type="number" id="num2" min="1" max="9" value="1">
        </div>
        <br>

        <div>
            <p class="p_palette">Количество 8-рок</p>
            <input type="number" id="num3" min="1" max="9" value="1">
        </div>
        <br>

        <div>
            <p class="p_palette">Остаток:</p>
            <input type="number" id="num4" min="1" max="8" value="1">
        </div>
        <br>

        <div>
            <button onclick="accept()">Посчитать</button>
        </div>

        <div>
            <p id="result_all" class="p_palette">0</p>
        </div>

    </body>
</html>
