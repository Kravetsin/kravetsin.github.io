<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <head>
        <script src="calculator.js"></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

                <!-- Меню -->
        <div class="navbar">
            <a href="index.html">Главная</a>
            <a href="https://www.youtube.com/channel/UCa9WkTS6IPPprOOgAKS77EA">YouTube</a>
            <div class="dropdown">
                <button class="dropbtn">Меню 
                <i class="fa fa-caret-down"></i>
                </button>
                <div class="dropdown-content">
                <a href="web1.html">Черновик</a>
                <a href="calcul.html">Калькулятор</a>
                <a href="#">Coming soon</a>
                </div>
            </div> 
        </div>

        <!-- Счетчик палет -->
        <div style="position: absolute; left: 50%; top: 15%;" class="block, border">
            <div>
                <button id="score" onclick="level_up()" style="font-size: 5vw;">Счетчик палет</button>
            </div>
        </div>
        <br>

        <!-- Вычисление неполной палеты -->
        <div class="border">
            <div>
                <button id="b_1" onclick="op='300'">300g</button>
                <button id="b_2" onclick="op='400'">400g</button>
                <button id="b_3" onclick="op='180'">180g</button>
            </div><br>

            <div>
                <button onclick="accept_g()">Подтвердить</button>
            </div>

            <div>
                <p id="result_g" style="color:rgb(255, 213, 0);">Вес не выбран.</p>
            </div><hr>

            <div>
                <p class="p_palette">Количество рядов:</p>
                <input type="number" id="num1" min="1" max="15" value="0" onmouseover="style.background='yellow'" onmouseleave="style.background='white'">
            </div><hr>
            
            <div>
                <p class="p_palette">Количество 7-рок(12):</p>
                <input type="number" id="num2" min="1" max="9" value="0" style="border: 2px;" onmouseover="style.background='yellow'" onmouseleave="style.background='white'">
            </div><hr>

            <div>
                <p class="p_palette">Количество 8-рок(15):</p>
                <input type="number" id="num3" min="1" max="9" value="0" onmouseover="style.background='yellow'" onmouseleave="style.background='white'">
            </div><hr>

            <div>
                <p class="p_palette">Остаток:</p>
                <input type="number" id="num4" min="1" max="8" value="0" onmouseover="style.background='yellow'" onmouseleave="style.background='white'">
            </div><hr>

            <div>
                <button onclick="accept_ks()">Посчитать</button>
            </div>

            <div>
                <p id="result_all" style="color:rgb(255, 213, 0) ;">Количество штук:</p>
            </div>
        </div>
    </body>
</html>
